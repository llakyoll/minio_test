version: "3.9"

services:
  app:
    build: .
    container_name: server_arch_app
    env_file: .env
    environment:
      - GATEWAY_BASE=${GATEWAY_BASE}
      - API_KEY=${API_KEY}
      - BRANCH_ID=${BRANCH_ID}
    depends_on:
      - mock_server
      - minio
    networks:
      - arch_net

  mock_server:
    build: .
    container_name: mock_server
    command: python -m server_arch.mockServer.mock_server
    ports:
      - "8085:8085"
    networks:
      - arch_net

  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY:-minioadmin123}
    volumes:
      - minio_data:/data
    networks:
      - arch_net

volumes:
  minio_data:

networks:
  arch_net:
    driver: bridge
